<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#030912;--surface:#08141F;--card:#0C1E2E;--border:#162840;--gold:#FFD700;--green:#00E676;--red:#FF3B4E;--blue:#00B4FF;--text:#EDF2F7;--muted:#4A7090;--r:12px}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border)}

/* NAV */
.nav{position:sticky;top:0;z-index:200;background:rgba(3,9,18,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;height:56px;gap:1rem}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;background:linear-gradient(90deg,var(--gold),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.nav-links{display:flex;gap:.2rem;margin-left:auto}
.nav-links a{font-size:.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:.4rem .8rem;border-radius:8px;transition:all .2s;border:1px solid transparent;white-space:nowrap}
.nav-links a:hover{color:var(--gold);border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.06)}

/* TEAM HERO */
.team-hero{position:relative;min-height:280px;display:flex;align-items:flex-end;padding:0 1rem 2rem;overflow:hidden}
.th-bg{position:absolute;inset:0;background:var(--th-grad);opacity:.7}
.th-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,9,18,.1) 0%,rgba(3,9,18,.7) 60%,var(--bg) 100%)}
.th-content{position:relative;z-index:1;display:flex;align-items:flex-end;gap:1.5rem;flex-wrap:wrap;width:100%;max-width:1100px;margin:0 auto}
.th-flag{font-size:5rem;filter:drop-shadow(0 8px 24px rgba(0,0,0,.7));line-height:1;flex-shrink:0}
.th-text h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,7vw,5.5rem);letter-spacing:4px;color:#fff;line-height:1;text-shadow:0 4px 20px rgba(0,0,0,.8)}
.th-text .sub{font-size:.8rem;color:rgba(255,255,255,.6);margin-top:.4rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.grp-badge{font-family:'Bebas Neue',sans-serif;background:var(--gold);color:#000;font-size:.8rem;letter-spacing:1px;padding:.15rem .6rem;border-radius:6px}
.score-ring{margin-left:auto;flex-shrink:0;width:82px;height:82px;border-radius:50%;border:3px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(8px)}
.score-ring .n{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);line-height:1}
.score-ring .l{font-size:.48rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-align:center;line-height:1.4}

/* CONTENT */
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 4rem}
.sec-head{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--gold);display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.sec-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,215,0,.4),transparent)}

/* Stats */
.stat-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.5rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;flex:1;min-width:90px}
.stat-card .v{font-family:'Bebas Neue',sans-serif;color:var(--gold);font-size:1.6rem;line-height:1}
.stat-card .v.sm{font-size:.88rem;font-family:'Inter',sans-serif;font-weight:800;color:var(--gold)}
.stat-card .l{font-size:.6rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:.2rem}

/* Bio & Trivia */
.bio-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1.5rem;line-height:1.85;font-size:.86rem;color:rgba(255,255,255,.8)}
.bio-card h3{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;color:var(--green);margin-bottom:.6rem}
.trivia{background:linear-gradient(135deg,rgba(255,215,0,.06),rgba(255,215,0,.02));border:1px solid rgba(255,215,0,.2);border-left:4px solid var(--gold);border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.8rem;font-size:.86rem;line-height:1.8;color:rgba(255,255,255,.8)}
.trivia strong{color:var(--gold);display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:.4rem}

/* ── FIXTURE ROWS ─────────────────────────────── */
.fx-row{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:.7rem 1rem;margin-bottom:.5rem;
  display:flex;align-items:center;gap:.8rem;
  position:relative;overflow:hidden;transition:border-color .2s;
  flex-wrap:wrap;
}
.fx-row:hover{border-color:rgba(255,215,0,.3)}
.fx-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fx-c,var(--border))}
.fx-time{font-size:.72rem;font-weight:700;color:var(--gold);min-width:130px;flex-shrink:0}
.fx-teams{flex:1;font-size:.82rem;font-weight:600;color:rgba(255,255,255,.9);min-width:180px}
.fx-teams a{color:var(--gold)}.fx-teams a:hover{text-decoration:underline}

/* Score badge (FT/LIVE) */
.fx-result{
  display:flex;align-items:center;gap:.5rem;flex-shrink:0;
}
.fx-score-num{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px}
.fx-score-num.w{color:var(--green)}.fx-score-num.l{color:var(--red)}.fx-score-num.d{color:var(--muted)}.fx-score-num.live{color:var(--red)}
.fx-badge{font-size:.6rem;font-weight:800;letter-spacing:1px;padding:.15rem .45rem;border-radius:4px;text-transform:uppercase}
.fx-badge.ft{background:rgba(0,230,118,.15);color:var(--green)}
.fx-badge.live{background:rgba(255,59,78,.2);color:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── COUNTDOWN (Orbitron for numbers, Inter for labels) ── */
.fx-cd{
  display:inline-flex;align-items:center;gap:2px;
  flex-shrink:0;
}
.cd-digit{
  font-family:'Orbitron',monospace;font-weight:700;
  font-size:.9rem;color:var(--gold);
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);
  border-radius:4px;padding:.15rem .35rem;min-width:30px;text-align:center;
  line-height:1.2;
}
.cd-unit-label{
  font-family:'Inter',sans-serif;font-size:.55rem;font-weight:800;
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
  margin-right:3px;
}
.cd-sep-dot{color:rgba(255,215,0,.3);font-size:.9rem;font-family:'Orbitron',monospace;margin:0 2px;padding-bottom:2px}
.fx-started{font-size:.72rem;color:var(--muted);font-style:italic}

/* Squad score */
.sq-score-wrap{margin-bottom:1.8rem}
.sq-bar{height:8px;border-radius:4px;background:var(--border);margin-bottom:.5rem;overflow:hidden}
.sq-fill{height:100%;border-radius:4px}
.sq-info{display:flex;align-items:center;gap:1.2rem;margin-bottom:.7rem}
.sq-num{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;line-height:1}
.sq-tier{font-weight:800;font-size:.95rem}
.sq-sub{font-size:.7rem;color:var(--muted);margin-top:.2rem}

/* Squad table */
.tbl-wrap{overflow-x:auto;margin-bottom:2rem;-webkit-overflow-scrolling:touch}
.sq-table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:520px}
.sq-table th{background:var(--surface);font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:.6rem .7rem;text-align:center;border-bottom:2px solid var(--border);white-space:nowrap}
.sq-table th:nth-child(1),.sq-table th:nth-child(2){text-align:left}
.sq-table td{padding:.48rem .7rem;text-align:center;border-bottom:1px solid rgba(22,40,64,.4)}
.sq-table td:nth-child(1),.sq-table td:nth-child(2){text-align:left}
.sq-table tr:hover td{background:rgba(255,215,0,.03)}
.pos-badge{display:inline-block;font-size:.56rem;font-weight:900;letter-spacing:1px;padding:.12rem .4rem;border-radius:4px;text-transform:uppercase}
.GK{background:rgba(255,59,78,.15);color:var(--red)}.DEF{background:rgba(0,180,255,.12);color:var(--blue)}.MID{background:rgba(0,230,118,.12);color:var(--green)}.FWD{background:rgba(255,215,0,.12);color:var(--gold)}
.r-bar{display:flex;align-items:center;gap:.4rem}
.r-val{font-weight:800;color:#fff;min-width:24px}
.r-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.r-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--gold))}
.row-num{color:var(--muted);font-size:.7rem}

/* Teammates */
.teammates{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:2rem}
.tm-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.8rem 1.1rem;display:flex;align-items:center;gap:.7rem;transition:border-color .2s,transform .2s}
.tm-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.tm-flag{font-size:2rem}
.tm-name{font-weight:800;font-size:.85rem}
.tm-sub{font-size:.68rem;color:var(--muted);margin-top:.15rem}
.tm-sub strong{color:var(--gold)}

.footer{border-top:1px solid var(--border);padding:1.5rem;text-align:center;font-size:.73rem;color:var(--muted)}
.footer a{color:var(--muted)}.footer a:hover{color:var(--gold)}

/* Live update status */
#team-live-bar{display:flex;align-items:center;gap:.5rem;padding:.35rem 1rem;background:rgba(8,20,31,.9);border-bottom:1px solid var(--border);font-size:.68rem;color:var(--muted);position:sticky;top:56px;z-index:190;backdrop-filter:blur(8px)}
#tlive-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
#tlive-dot.ok{background:var(--green)}
#tlive-dot.syncing{background:var(--gold);animation:glow .8s infinite}
#tlive-dot.error{background:var(--red)}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}

/* Responsive */
@media(max-width:600px){
  .th-flag{font-size:3.5rem}
  .score-ring{width:68px;height:68px}
  .score-ring .n{font-size:1.6rem}
  .fx-time{min-width:100px;font-size:.68rem}
  .teammates{gap:.5rem}
  .tm-card{padding:.6rem .8rem}
}
</style>
</head>

<nav class="nav">

<div class="wrap">

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
// ═══════════════════════════════════════════
//  ESPN LIVE FEED (same as index.html)
// ═══════════════════════════════════════════
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
const GROUPS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

const ESPN_MAP = {
  'Mexico':'mexico','South Africa':'south_africa','Korea Republic':'south_korea',
  'South Korea':'south_korea','Czech Republic':'czechia','Czechia':'czechia',
  'Canada':'canada','Bosnia and Herzegovina':'bosnia','Bosnia & Herzegovina':'bosnia',
  'Qatar':'qatar','Switzerland':'switzerland','Brazil':'brazil','Morocco':'morocco',
  'Haiti':'haiti','Scotland':'scotland','United States':'usa','USA':'usa',
  'Paraguay':'paraguay','Australia':'australia','Turkey':'turkiye','Türkiye':'turkiye',
  'Germany':'germany','Curaçao':'curacao','Curacao':'curacao',
  "Côte d'Ivoire":'ivory_coast',"Cote d'Ivoire":'ivory_coast','Ivory Coast':'ivory_coast',
  'Ecuador':'ecuador','Netherlands':'netherlands','Japan':'japan','Sweden':'sweden',
  'Tunisia':'tunisia','Belgium':'belgium','Egypt':'egypt','Iran':'iran',
  'New Zealand':'new_zealand','Spain':'spain','Cape Verde':'cape_verde',
  'Saudi Arabia':'saudi_arabia','Uruguay':'uruguay','France':'france',
  'Senegal':'senegal','Iraq':'iraq','Norway':'norway','Argentina':'argentina',
  'Algeria':'algeria','Austria':'austria','Jordan':'jordan','Portugal':'portugal',
  'DR Congo':'dr_congo','Congo DR':'dr_congo','Democratic Republic of Congo':'dr_congo',
  'Uzbekistan':'uzbekistan','Colombia':'colombia','England':'england',
  'Croatia':'croatia','Ghana':'ghana','Panama':'panama',
  'MEX':'mexico','RSA':'south_africa','KOR':'south_korea','CZE':'czechia',
  'CAN':'canada','BIH':'bosnia','QAT':'qatar','SUI':'switzerland',
  'BRA':'brazil','MAR':'morocco','HAI':'haiti','SCO':'scotland',
  'PAR':'paraguay','AUS':'australia','TUR':'turkiye','GER':'germany',
  'CUW':'curacao','CIV':'ivory_coast','ECU':'ecuador','NED':'netherlands',
  'JPN':'japan','SWE':'sweden','TUN':'tunisia','BEL':'belgium','EGY':'egypt',
  'IRN':'iran','NZL':'new_zealand','ESP':'spain','CPV':'cape_verde',
  'KSA':'saudi_arabia','URU':'uruguay','FRA':'france','SEN':'senegal',
  'IRQ':'iraq','NOR':'norway','ARG':'argentina','ALG':'algeria',
  'AUT':'austria','JOR':'jordan','POR':'portugal','COD':'dr_congo',
  'UZB':'uzbekistan','COL':'colombia','ENG':'england','CRO':'croatia',
  'GHA':'ghana','PAN':'panama',
};

function resolveTeam(t){return ESPN_MAP[t.displayName]||ESPN_MAP[t.shortDisplayName]||ESPN_MAP[t.abbreviation]||null}

async function fetchDate(ds){
  const r=await fetch(`${ESPN_BASE}?dates=${ds}`);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
function parseEvents(data){
  return(data.events||[]).flatMap(ev=>{
    const c=ev.competitions?.[0];if(!c)return[];
    const hc=c.competitors.find(x=>x.homeAway==='home');
    const ac=c.competitors.find(x=>x.homeAway==='away');
    if(!hc||!ac)return[];
    const hId=resolveTeam(hc.team),aId=resolveTeam(ac.team);
    if(!hId||!aId)return[];
    const state=c.status?.type?.state||'pre';
    const detail=c.status?.type?.shortDetail||'';
    let clock='';
    if(state==='in'){
      if(/^HT$/i.test(detail.trim())||/half.?time/i.test(detail)) clock='HT';
      else { const m=detail.match(/^(\d+(?:[+]\d+)?)'?/); clock=m?m[1]+"'":'LIVE'; }
    }
    return[{home:hId,away:aId,
      hs:state!=='pre'?parseInt(hc.score||0):null,
      as:state!=='pre'?parseInt(ac.score||0):null,
      st:state==='post'?'FT':state==='in'?'LIVE':'NS',clock,espnId:ev.id}];
  });
}
async function fetchAllRecent(){
  const datesToFetch=new Set();

  // Standard rolling window: 3 days back + today + tomorrow
  [-3,-2,-1,0,1].forEach(o=>{
    const d=new Date(Date.now()+o*86400000);
    datesToFetch.add(d.toISOString().slice(0,10).replace(/-/g,''));
  });

  // Also fetch the specific date of ANY match that hasn't received an espnId
  // yet (covers old matches that fell outside the rolling window before
  // getting their ID — without this, a match can get permanently stuck at
  // st:'NS' forever if it's ever missed once, since there's no other path
  // back into the fetch window for a date that's already in the past).
  const tomorrow=new Date(Date.now()+86400000);
  MATCHES.filter(m=>GROUPS.includes(m.grp)&&!m.espnId).forEach(m=>{
    const d=new Date(m.utc);
    if(d<=tomorrow){
      datesToFetch.add(d.toISOString().slice(0,10).replace(/-/g,''));
    }
  });

  const days=[...datesToFetch];
  const all=[];
  const res=await Promise.allSettled(days.map(ds=>fetchDate(ds)));
  res.forEach((r,i)=>{if(r.status==='fulfilled')all.push(...parseEvents(r.value));});
  return all;
}
function patchMatches(live){
  let changed=false;
  live.forEach(r=>{
    const m=MATCHES.find(m=>GROUPS.includes(m.grp)&&m.home===r.home&&m.away===r.away);
    if(!m)return;
    if(m.st!==r.st||m.hs!==r.hs||m.as!==r.as){m.st=r.st;m.hs=r.hs;m.as=r.as;changed=true;}
    if(r.espnId&&!m.espnId) m.espnId=r.espnId;
  });
  return changed;
}

// ═══════════════════════════════════════════
//  COUNTDOWN — Orbitron digits, Inter labels
// ═══════════════════════════════════════════
const cdTimers={};
function cdDigit(n){return`<span class="cd-digit">${String(n).padStart(2,'0')}</span>`}
function cdLabel(l){return`<span class="cd-unit-label">${l}</span>`}

function startFxCountdown(el, matchId){
  const go=()=>{
    // Always re-check live match status (updates via ESPN)
    const m=MATCHES.find(x=>x.id===matchId);
    if(!m){el.innerHTML='';return;}

    // If ESPN has updated the status, show result instead of countdown
    if(m.st==='FT'){
      el.innerHTML=`<span class="fx-score-num d" style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px">${m.hs}–${m.as}</span> <span class="fx-badge ft">FT</span>`;
      clearInterval(cdTimers[matchId]);
      return;
    }
    if(m.st==='LIVE'){
      el.innerHTML=`<span class="fx-score-num live" style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px">${m.hs}–${m.as}</span> <span class="fx-badge live">🔴 Live</span>`;
      return;
    }

    // Still upcoming — show countdown
    const diff=new Date(m.utc)-new Date();
    if(diff<=0){
      // Kickoff time passed but no ESPN update yet
      el.innerHTML=`<span class="fx-started">⏳ Starting soon…</span>`;
      return;
    }
    const D=Math.floor(diff/86400000);
    const H=Math.floor(diff%86400000/3600000);
    const M=Math.floor(diff%3600000/60000);
    const S=Math.floor(diff%60000/1000);

    // Numbers in Orbitron boxes, labels in Inter
    el.innerHTML=
      cdDigit(D)+cdLabel('d')+
      `<span class="cd-sep-dot">:</span>`+
      cdDigit(H)+cdLabel('h')+
      `<span class="cd-sep-dot">:</span>`+
      cdDigit(M)+cdLabel('m')+
      `<span class="cd-sep-dot">:</span>`+
      cdDigit(S)+cdLabel('s');
  };
  go();
  cdTimers[matchId]=setInterval(go,1000);
}

// ═══════════════════════════════════════════
//  RENDER FIXTURES (called on load + ESPN update)
// ═══════════════════════════════════════════
let currentTid = null;
const fxColors=['var(--gold)','var(--green)','var(--blue)'];

function renderFixtures(tid){
  const IST=5.5*3600000;
  function fmtIST(u){return new Date(new Date(u).getTime()+IST).toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'UTC'})+' IST'}

  // Clear existing timers
  Object.entries(cdTimers).forEach(([id,t])=>{clearInterval(t);delete cdTimers[id]});

  const tm=MATCHES.filter(m=>(m.home===tid||m.away===tid)&&GROUPS.includes(m.grp));

  document.getElementById('fixtures').innerHTML=tm.map((m,i)=>{
    const isH=m.home===tid;
    const opp=TEAMS[isH?m.away:m.home];
    const isFT=m.st==='FT', isLive=m.st==='LIVE', isNS=m.st==='NS';
    const T=TEAMS[tid];

    // Build right-side element
    let rightHtml='';
    if(isFT){
      const my=isH?m.hs:m.as, op=isH?m.as:m.hs;
      const cls=my>op?'w':my<op?'l':'d';
      rightHtml=`<div class="fx-result"><span class="fx-score-num ${cls}">${m.hs}–${m.as}</span><span class="fx-badge ft">FT</span></div>`;
    } else if(isLive){
      rightHtml=`<div class="fx-result"><span class="fx-score-num live">${m.hs}–${m.as}</span><span class="fx-badge live">🔴 Live</span></div>`;
    } else {
      rightHtml=`<div class="fx-cd" id="fcd-${m.id}"></div>`;
    }

    const teamLine=isH
      ?`<strong>${T.flag} ${T.name}</strong> vs ${opp.flag} <a href="team.html?team=${isH?m.away:m.home}">${opp.name}</a>`
      :`${opp.flag} <a href="team.html?team=${isH?m.away:m.home}">${opp.name}</a> vs <strong>${T.flag} ${T.name}</strong>`;

    return`<div class="fx-row" style="--fx-c:${fxColors[i%3]}">
      <div class="fx-time">${fmtIST(m.utc)}</div>
      <div class="fx-teams">${teamLine}</div>
      ${rightHtml}
    </div>`;
  }).join('');

  // Start countdowns only for NS matches
  tm.filter(m=>m.st==='NS').forEach(m=>{
    const el=document.getElementById('fcd-'+m.id);
    if(el) startFxCountdown(el, m.id);
  });
}

// ═══════════════════════════════════════════
//  STATUS BAR
// ═══════════════════════════════════════════
function setTStatus(mode,msg){
  const dot=document.getElementById('tlive-dot');
  const txt=document.getElementById('tlive-txt');
  dot.className='';
  if(mode==='syncing'){dot.classList.add('syncing');txt.textContent=msg||'Fetching from ESPN…'}
  else if(mode==='ok'){dot.classList.add('ok');txt.textContent=msg||'Results live'}
  else if(mode==='error'){dot.classList.add('error');txt.textContent=msg||'ESPN unreachable'}
}

// ═══════════════════════════════════════════
//  MAIN INIT
// ═══════════════════════════════════════════
(function(){
  const p=new URLSearchParams(location.search);
  const tid=p.get('team')||'argentina';
  const T=TEAMS[tid];
  currentTid=tid;
  if(!T){document.body.innerHTML='<div style="text-align:center;padding:4rem;color:#4A7090">Team not found. <a href="index.html" style="color:#FFD700">← Home</a></div>';return}
  document.title=`${T.name} — FIFA World Cup 2026`;

  // Hero
  const[c1,c2]=T.colors;
  document.getElementById('th-bg').style.background=`linear-gradient(135deg,${c1} 0%,${c1}88 30%,${c2}66 70%,${c2} 100%)`;
  document.getElementById('th-flag').textContent=T.flag;
  document.getElementById('th-name').textContent=T.name;
  document.getElementById('th-sub').innerHTML=`<span class="grp-badge">${T.group}</span> Group ${T.group} &nbsp;·&nbsp; FIFA Rank <strong>#${T.fifa_rank}</strong> &nbsp;·&nbsp; ${T.cap}`;

  // Squad score
  const players=PLAYERS[tid]||[];
  const score=getSquadScore(players);
  document.getElementById('score-n').textContent=score;

  // Stats
  document.getElementById('stat-row').innerHTML=[
    {v:`#${T.fifa_rank}`,l:'FIFA Rank'},
    {v:T.wc_apps,l:'WC Appearances'},
    {v:T.best,l:'Best Finish',sm:true},
    {v:T.founded,l:'Fed. Est.'},
    {v:T.pop,l:'Population'},
  ].map(s=>`<div class="stat-card"><div class="v ${s.sm?'sm':''}">${s.v}</div><div class="l">${s.l}</div></div>`).join('');

  // Bio & Trivia
  document.getElementById('bio-h3').textContent=`${T.flag} ${T.name}`;
  document.getElementById('bio-txt').textContent=T.bio||'Information coming soon.';
  document.getElementById('trivia-txt').textContent=T.trivia||'Football history in the making.';

  // Fixtures (initial render)
  renderFixtures(tid);

  // Squad score bar
  const tier=score>=80?{l:'World Class'}:score>=65?{l:'Strong'}:score>=45?{l:'Competitive'}:{l:'Developing'};
  document.getElementById('sq-score-wrap').innerHTML=`
    <div class="sq-info">
      <div class="sq-num" style="color:${c1}">${score}</div>
      <div><div class="sq-tier" style="color:${c1}">${tier.l}</div>
        <div class="sq-sub">Based on avg EA FC rating of ${players.length} players</div></div>
    </div>
    <div class="sq-bar"><div class="sq-fill" style="width:${score}%;background:linear-gradient(90deg,${c1},${c2})"></div></div>
    <div style="font-size:.68rem;color:var(--muted)">0 — Developing &nbsp;&nbsp; Competitive — 100</div>`;

  // Squad table
  const sorted=[...players].sort((a,b)=>{const o={GK:0,DEF:1,MID:2,FWD:3};return(o[a.p]??4)-(o[b.p]??4)||b.r-a.r});
  document.getElementById('sq-tbody').innerHTML=sorted.map((pl,i)=>{
    const isGK=pl.p==='GK';
    const pct=Math.max(0,Math.min(100,(pl.r-65)/30*100));
    return`<tr><td class="row-num">${i+1}</td><td style="font-weight:700">${pl.n}</td>
      <td><span class="pos-badge ${pl.p}">${pl.p}</span></td>
      <td>${pl.ag}</td><td style="color:var(--muted);font-size:.73rem">${pl.cl}</td>
      <td>${isGK?(pl.sv||'–'):(pl.g??'–')}</td>
      <td>${isGK?'–':(pl.as??'–')}</td>
      <td>${pl.ca}</td>
      <td><div class="r-bar"><span class="r-val">${pl.r}</span><div class="r-track"><div class="r-fill" style="width:${pct}%"></div></div></div></td>
    </tr>`;
  }).join('');

  // Teammates
  const allIds=[...new Set(MATCHES.filter(m=>m.grp===T.group).flatMap(m=>[m.home,m.away]))].filter(id=>id!==tid&&TEAMS[id]);
  document.getElementById('teammates').innerHTML=allIds.map(id=>{
    const t=TEAMS[id];const s=getSquadScore(PLAYERS[id]||[]);
    return`<a href="team.html?team=${id}" class="tm-card">
      <div class="tm-flag">${t.flag}</div>
      <div><div class="tm-name">${t.name}</div>
        <div class="tm-sub">Rank #${t.fifa_rank} · Score <strong>${s}/100</strong></div></div>
    </a>`;
  }).join('');

  // ── ESPN POLLING ──────────────────────────
  let pollTimer=null;
  function nextInterval(){
    const gm=MATCHES.filter(m=>GROUPS.includes(m.grp));
    if(gm.some(m=>m.st==='LIVE'))return 30000;
    const now=Date.now();
    if(gm.some(m=>m.st==='NS'&&Math.abs(new Date(m.utc)-now)<3*3600000))return 60000;
    return 5*60000;
  }

  async function poll(){
    setTStatus('syncing');
    try{
      const live=await fetchAllRecent();
      const changed=patchMatches(live);
      if(changed) renderFixtures(tid); // re-render fixtures with new data
      setTStatus('ok','Results live · ESPN');
    }catch(e){
      setTStatus('error','ESPN unreachable');
    }
    pollTimer=setTimeout(poll,nextInterval());
  }
  poll();
})();
</script>
</body>
</html>
